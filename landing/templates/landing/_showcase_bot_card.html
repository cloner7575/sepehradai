<article class="showcase-bot-card showcase-bot-card--{{ bot.platform }} reveal">
  <div class="showcase-bot-accent" aria-hidden="true"></div>
  <div class="showcase-bot-media">
    <img src="{{ bot.image.url }}" alt="{{ bot.name }}" loading="lazy" width="320" height="200">
    <div class="showcase-bot-media-overlay" aria-hidden="true"></div>
    <span class="showcase-bot-platform">
      {% if bot.platform == 'telegram' %}
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9.04 15.31 8.9 18.6c.32 0 .46-.14.63-.31l1.52-1.45 3.15 2.31c.58.32 1 .15 1.15-.54l2.07-9.72h.01c.18-.84-.3-1.17-.85-.96L4.3 10.28c-.82.32-.81.78-.14.99l4.45 1.39 10.33-6.51c.49-.3.93-.14.57.19"/></svg>
      {% else %}
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3C7.03 3 3 6.58 3 11c0 2.39 1.19 4.53 3.07 6.06L5 21l3.45-1.72c.94.26 1.94.4 2.97.4 4.97 0 9-3.58 9-8s-4.03-8-9-8zm0 14.5c-.9 0-1.77-.13-2.58-.37l-.18-.06-1.85.93.35-1.8-.12-.18A6.47 6.47 0 0 1 5.5 11C5.5 7.41 8.41 4.5 12 4.5S18.5 7.41 18.5 11 15.59 17.5 12 17.5z"/></svg>
      {% endif %}
      {{ bot.get_platform_display_fa }}
    </span>
  </div>
  <div class="showcase-bot-body">
    <h3>{{ bot.name }}</h3>
    <p>{{ bot.description }}</p>
    <a href="{{ bot.bot_url }}" class="showcase-bot-cta" target="_blank" rel="noopener">
      <span>مشاهده ربات</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M7 17L17 7M17 7H9M17 7v8"/></svg>
    </a>
  </div>
</article>
