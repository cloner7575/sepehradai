{% with name=request.resolver_match.url_name %}
<nav class="catalog-subnav" aria-label="ناوبری مینی‌اپ">
  <a href="{% url 'catalog_dashboard' %}" class="catalog-subnav-link{% if name == 'catalog_dashboard' %} is-active{% endif %}">
    <i class="bi bi-speedometer2"></i><span>داشبورد</span>
  </a>
  <a href="{% url 'catalog_onboarding' %}" class="catalog-subnav-link{% if name == 'catalog_onboarding' %} is-active{% endif %}">
    <i class="bi bi-rocket-takeoff"></i><span>راه‌اندازی</span>
  </a>
  <a href="{% url 'catalog_templates' %}" class="catalog-subnav-link{% if name == 'catalog_templates' or name == 'catalog_template_apply' %} is-active{% endif %}">
    <i class="bi bi-layout-text-window-reverse"></i><span>قالب‌های آماده</span>
  </a>
  <a href="{% url 'catalog_flow_engine' %}" class="catalog-subnav-link{% if name == 'catalog_flow_engine' %} is-active{% endif %}">
    <i class="bi bi-palette"></i><span>طراحی صفحه مینی‌اپ</span>
  </a>
  <a href="{% url 'catalog_item_list' %}" class="catalog-subnav-link{% if name == 'catalog_item_list' or name == 'catalog_item_create' or name == 'catalog_item_edit' %} is-active{% endif %}">
    <i class="bi bi-box-seam"></i><span>آیتم‌ها</span>
  </a>
  <a href="{% url 'catalog_category_list' %}" class="catalog-subnav-link{% if name == 'catalog_category_list' or name == 'catalog_category_create' or name == 'catalog_category_edit' %} is-active{% endif %}">
    <i class="bi bi-folder"></i><span>دسته‌ها</span>
  </a>
  <a href="{% url 'catalog_bulk_import' %}" class="catalog-subnav-link{% if name == 'catalog_bulk_import' or name == 'catalog_bulk_import_sample' %} is-active{% endif %}">
    <i class="bi bi-file-earmark-spreadsheet"></i><span>ورود گروهی</span>
  </a>
  <a href="{% url 'catalog_order_list' %}" class="catalog-subnav-link{% if name == 'catalog_order_list' or name == 'catalog_order_detail' %} is-active{% endif %}">
    <i class="bi bi-receipt"></i><span>سفارش‌ها</span>
  </a>
  <a href="{% url 'catalog_settings' %}" class="catalog-subnav-link{% if name == 'catalog_settings' %} is-active{% endif %}">
    <i class="bi bi-sliders"></i><span>تنظیمات</span>
  </a>
</nav>
{% endwith %}
