{% with s=order.status %}
<span class="catalog-pill catalog-order-pill{% if s == 'paid' %} catalog-pill--ok{% elif s == 'pending' %} catalog-pill--warn{% elif s == 'c2c_pending' %} catalog-pill--info{% elif s == 'request' %} catalog-pill--info{% elif s == 'failed' %} catalog-pill--danger{% elif s == 'cancelled' %} catalog-pill--muted{% endif %}">{{ order.get_status_display }}</span>
{% endwith %}
