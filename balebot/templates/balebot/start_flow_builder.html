{% load static %}
<div class="flow-builder-wrap flow-builder-wrap--studio" id="flow-builder-root"
     data-hidden-id="id_start_flow"
     data-upload-url="{% url 'flow_media_upload' %}"
     data-platform-label="{{ active_platform_label|default:'بله' }}">

  <div class="flow-builder-intro mb-3">
    <div class="d-flex flex-wrap gap-2">
      <span class="flow-builder-tip"><i class="bi bi-plus-lg"></i> متن، عکس، ویدیو، صدا، فایل</span>
      <span class="flow-builder-tip"><i class="bi bi-ui-checks-grid"></i> دکمه و زیرمنو</span>
      <span class="flow-builder-tip"><i class="bi bi-link-45deg"></i> URL برای مینی‌اپ</span>
      <span class="flow-builder-tip"><i class="bi bi-tags"></i> slug = برچسب مخاطب</span>
    </div>
  </div>

  <div id="flow-builder-host"></div>

  <div class="visually-hidden" aria-hidden="true">{{ form.start_flow }}</div>
</div>
<script src="{% static 'balebot/js/flow_builder.js' %}"></script>
