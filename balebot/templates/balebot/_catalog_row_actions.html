<div class="catalog-row-actions">
  <a href="{{ edit_url }}" class="btn btn-panel-ghost btn-sm catalog-row-action" title="ویرایش" aria-label="ویرایش {{ label }}"><i class="bi bi-pencil"></i></a>
  <form method="post" action="{{ delete_url }}" class="catalog-row-delete-form"
        data-confirm="{% if entity_type == 'category' %}دسته «{{ label|escapejs }}»{% if item_count %} و {{ item_count }} آیتم مرتبط (بدون دسته){% endif %}{% elif entity_type == 'discount' %}کد تخفیف «{{ label|escapejs }}»{% else %}آیتم «{{ label|escapejs }}»{% endif %} حذف شود؟ این کار قابل بازگشت نیست."
        onsubmit="return confirm(this.getAttribute('data-confirm'));">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-danger btn-sm border-opacity-50 catalog-row-action" title="حذف" aria-label="حذف {{ label }}"><i class="bi bi-trash"></i></button>
  </form>
</div>
